name: Ralph Arcade Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-native:
    name: Build Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libx11-dev libxrandr-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev libxinerama-dev python3 python3-pip cppcheck
        pip3 install Pillow

    - name: Run Cppcheck Analysis
      if: runner.os == 'Linux'
      run: |
        cmake -B build-cppcheck
        cmake --build build-cppcheck --target cppcheck

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Python Dependencies
      run: pip install Pillow

    - name: Configure CMake (with Coverage and Sanitizers)
      if: runner.os == 'Linux'
      run: cmake -B build-dev -DCMAKE_BUILD_TYPE=Debug -DUSE_SANITIZERS=ON -DENABLE_COVERAGE=ON

    - name: Build Project (Dev)
      if: runner.os == 'Linux'
      run: cmake --build build-dev

    - name: Run Tests with Coverage
      if: runner.os == 'Linux'
      env:
        ASAN_OPTIONS: detect_leaks=1:symbolize=1:abort_on_error=1
      run: |
        cd build-dev
        ctest -R AllTests --output-on-failure

    - name: Collect Coverage Data
      if: runner.os == 'Linux'
      run: |
        sudo apt-get install -y lcov
        lcov --capture --directory . --output-file coverage.info
        lcov --remove coverage.info '/usr/*' '*/tests/*' '*/_deps/*' --output-file coverage.info # Remove arquivos de sistema e dependências

    - name: Upload Coverage to Codecov
      if: runner.os == 'Linux'
      uses: codecov/codecov-action@v4
      with:
        files: coverage.info
        token: ${{ secrets.CODECOV_TOKEN }} # Opcional se o repo for público, mas recomendado
        fail_ci_if_error: false

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DENABLE_COVERAGE=OFF

    - name: Build Project
      run: cmake --build build --config Release

    - name: Run Unit Tests
      run: |
        cd build
        ctest -R AllTests -C Release --output-on-failure

    - name: Run Visual Tests (Experimental Headless)
      if: runner.os != 'Linux' # Headless Linux precisa de Xvfb, vamos pular por enquanto
      run: |
        cd build
        ctest -R VisualRegression -C Release --output-on-failure || echo "Aviso: Falha visual no CI (esperado em ambientes sem GPU)"

    - name: Generate Package (CPack)
      run: |
        cd build
        cpack -C Release

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: RalphArcade-${{ runner.os }}-Artifacts
        path: |
          build/*.zip
          build/*.dmg
          build/*.exe
          build/*.deb
          build/*.tar.gz

  build-web:
    name: Build Web (Emscripten)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Emscripten
      uses: mymindstorm/setup-emsdk@v14

    - name: Configure CMake (Web)
      run: emcmake cmake -B build-web -DCMAKE_BUILD_TYPE=Release

    - name: Build Web Project
      run: cmake --build build-web

    - name: Upload Web Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: RalphArcade-Web
        path: |
          build-web/*.html
          build-web/*.js
          build-web/*.wasm
          build-web/*.data

  release:
    name: Create GitHub Release
    needs: [build-native, build-web]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts

    - name: Consolidate files for release
      run: |
        mkdir -p ./release-files
        find ./artifacts -type f \( -name "*.zip" -o -name "*.dmg" -o -name "*.exe" -o -name "*.deb" -o -name "*.tar.gz" -o -name "*.html" -o -name "*.js" -o -name "*.wasm" -o -name "*.data" \) -exec cp {} ./release-files/ \;

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./release-files/*
        generate_release_notes: true
        draft: false
        prerelease: false
